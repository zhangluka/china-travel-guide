<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Panda face -->
  <circle cx="16" cy="16" r="15" fill="#FAFAF5"/>
  <!-- Ears -->
  <circle cx="5" cy="7" r="5" fill="#1A1A2E"/>
  <circle cx="27" cy="7" r="5" fill="#1A1A2E"/>
  <!-- Eye patches -->
  <ellipse cx="10.5" cy="14" rx="4.5" ry="5" fill="#1A1A2E" transform="rotate(-15 10.5 14)"/>
  <ellipse cx="21.5" cy="14" rx="4.5" ry="5" fill="#1A1A2E" transform="rotate(15 21.5 14)"/>
  <!-- Eyes -->
  <circle cx="10.5" cy="14" r="2" fill="#FAFAF5"/>
  <circle cx="21.5" cy="14" r="2" fill="#FAFAF5"/>
  <circle cx="11" cy="13.5" r="1" fill="#1A1A2E"/>
  <circle cx="22" cy="13.5" r="1" fill="#1A1A2E"/>
  <!-- Nose -->
  <ellipse cx="16" cy="19.5" rx="2.5" ry="1.8" fill="#1A1A2E"/>
  <!-- Mouth -->
  <path d="M14 22 Q16 24 18 22" stroke="#1A1A2E" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  <!-- Blush -->
  <ellipse cx="7.5" cy="18" rx="2" ry="1.2" fill="#FFB6C1" opacity="0.5"/>
  <ellipse cx="24.5" cy="18" rx="2" ry="1.2" fill="#FFB6C1" opacity="0.5"/>
</svg>
